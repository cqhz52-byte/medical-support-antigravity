<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>临床跟台 Case Support</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>临床跟台</h1>
      <button id="syncBtn" class="ghost-btn" type="button">同步离线数据</button>
    </header>

    <main>
      <!-- AUTH VIEW (LOGIN / REGISTER) -->
      <section id="loginView" class="view is-active">
        <div class="login-container">
          <div class="login-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="login-logo"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <h2>临床跟台支撑系统</h2>
            <p>医疗设备工程师专属工作台</p>
          </div>
          
          <!-- Login Form -->
          <form id="loginForm" class="login-form" novalidate>
            <h3>登录</h3>
            <div class="field-group">
              <label class="field-label" for="loginUsername">工号 / 账号</label>
              <input id="loginUsername" type="text" class="field" placeholder="请输入您的工号" required>
            </div>
            <div class="field-group">
              <label class="field-label" for="loginPassword">密 码</label>
              <input id="loginPassword" type="password" class="field" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="primary-btn btn-block" style="margin-top:20px; font-size:1.05rem;">立即登录</button>
            <p class="auth-switch">没有账号？ <span id="toRegisterBtn" class="auth-link">点此注册</span></p>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="login-form is-hidden" novalidate>
            <h3>新用户注册</h3>
            <div class="field-group">
              <label class="field-label" for="regUsername">真实姓名</label>
              <input id="regUsername" type="text" class="field" placeholder="输入姓名" required>
            </div>
            <div class="field-group">
              <label class="field-label" for="regPassword">设置密码</label>
              <input id="regPassword" type="password" class="field" placeholder="创建密码" required>
            </div>
            <button type="submit" class="primary-btn btn-block" style="margin-top:20px; font-size:1.05rem;">注册并登录</button>
            <p class="auth-switch">已有账号？ <span id="toLoginBtn" class="auth-link">返回登录</span></p>
          </form>
        </div>
      </section>

      <!-- DASHBOARD VIEW -->
      <section id="dashboardView" class="view">
        <div class="card welcome-card">
          <h2>今日工作台</h2>
          <p id="welcomeText">欢迎回来，工程师。</p>
          <div class="stats-grid">
            <article class="stat">
              <span class="stat-label">今日任务</span>
              <strong id="statToday">0</strong>
            </article>
            <article class="stat">
              <span class="stat-label">本月场次</span>
              <strong id="statMonth">0</strong>
            </article>
            <article class="stat">
              <span class="stat-label">待同步</span>
              <strong id="statPending">0</strong>
            </article>
          </div>
        </div>

        <div class="card" style="border-color: #bce3fb; background: linear-gradient(180deg, #f2f9fe, #ffffff);">
          <div class="card-title-row">
            <h3 style="color: #0369a1;">📋 待办指派任务</h3>
            <span class="status-badge in-progress" style="background:#e0f2fe; color:#0284c7;">最新派发</span>
          </div>
          <ul id="pendingTaskList" class="case-list">
            <!-- JS 将动态填充指派任务 -->
          </ul>
        </div>

        <div class="card">
          <div class="card-title-row">
            <h3>最近 3 场手术</h3>
          </div>
          <ul id="recentCaseList" class="case-list"></ul>
        </div>
      </section>

      <!-- CASE FORM VIEW -->
      <section id="caseFormView" class="view">
        <div class="card">
          <div class="card-title-row">
            <h2>新建跟台记录</h2>
            <button id="backBtn" class="ghost-btn" type="button">返回</button>
          </div>

          <div class="stepper" aria-label="分步表单">
            <div class="step is-active" data-step="1"><span>1</span>基础信息</div>
            <div class="step" data-step="2"><span>2</span>术中参数</div>
            <div class="step" data-step="3"><span>3</span>耗材使用</div>
            <div class="step" data-step="4"><span>4</span>总结与图片</div>
          </div>

          <form id="caseForm" novalidate>
            <div class="form-step is-active" data-step="1">
              <label class="field-label" for="hospitalSearch">合作医院</label>
              <input id="hospitalSearch" list="hospitalOptions" class="field" placeholder="搜索并选择医院" required>
              <datalist id="hospitalOptions"></datalist>

              <label class="field-label" for="doctorName">手术医生</label>
              <input id="doctorName" class="field" placeholder="请输入医生姓名" required>

              <label class="field-label" for="surgeryType">手术类型 (可选填或输入)</label>
              <input id="surgeryType" list="surgeryOptions" class="field" placeholder="例如：肝肿瘤消融术">
              <datalist id="surgeryOptions"></datalist>

              <label class="field-label" for="deviceModel">器械型号</label>
              <select id="deviceModel" class="field" required></select>
            </div>

            <div class="form-step" data-step="2">
              <div id="dynamicParameters">
                <div class="field-group param-row">
                  <div class="param-input">
                    <label class="field-label">输出功率(W)</label>
                    <input type="number" class="field" placeholder="例如：40">
                  </div>
                  <div class="param-input">
                    <label class="field-label">吸引压力(kPa)</label>
                    <input type="number" class="field" placeholder="例如：-80">
                  </div>
                </div>
              </div>
              
              <div style="display: flex; gap: 10px; margin-bottom: 14px;">
                <button id="addParamBtn" type="button" class="secondary-btn btn-block" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> 补充自定义参量
                </button>
                <button id="saveTemplateBtn" type="button" class="primary-btn" style="display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.8rem; padding: 0 12px;" title="将当前参数排列状态固化为此手术的自建模板">
                  💾 固定为本手术模板
                </button>
              </div>

              <div class="card-inline" style="margin-bottom: 14px; background: #fffdf9; border-color: #f3dfc6;">
                <div class="card-title-row" style="margin-bottom: 8px;">
                  <span style="font-size: 0.85rem; font-weight: 600; color: #b77626;">📄 纸质参数单补录 (如: 超声切片/打点条)</span>
                  <label for="paperParamInput" class="mini-btn" style="cursor:pointer; display: flex; align-items: center; gap: 4px; border-color: #f3dfc6; color: #b77626;">
                    📸 原生拍照
                  </label>
                  <input id="paperParamInput" type="file" accept="image/*" capture="environment" style="display:none;" multiple>
                </div>
                <div id="paperParamPreview" class="media-preview" style="border-color: #f3dfc6; background: rgba(255,255,255,0.6);">支持拍摄原纸单以替代手输入库</div>
              </div>

              <div class="switch-row">
                <span>是否异常</span>
                <label class="switch">
                  <input id="isAbnormal" type="checkbox">
                  <span class="slider"></span>
                </label>
              </div>

              <label class="field-label" for="outcome">术中结果</label>
              <textarea id="outcome" class="field" rows="3" placeholder="简要记录术中结果"></textarea>
            </div>

            <div class="form-step" data-step="3">
              <div class="card-inline">
                <div class="card-title-row">
                  <h3>设备耗材管理</h3>
                  <!-- QR Code Camera Trigger -->
                  <div style="display:flex; gap: 6px;">
                    <label for="qrScanInput" class="mini-btn scan-trigger" style="cursor:pointer; display: flex; align-items: center; gap: 4px;">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M7 3v3M17 3v3M7 21v-3M17 21v-3M3 7h3M21 7h-3M3 17h3M21 17h-3"/></svg> 扫码
                    </label>
                    <input id="qrScanInput" type="file" accept="image/*" capture="environment" style="display:none;" />
                    <button id="addConsumableBtn" type="button" class="mini-btn">手动添加</button>
                  </div>
                </div>
                <div id="consumableList"></div>
              </div>
            </div>

            <div class="form-step" data-step="4">
              <label class="field-label" for="complications">并发症/风险说明</label>
              <textarea id="complications" class="field" rows="3" placeholder="无可留空"></textarea>

              <label class="field-label" for="mediaInput">现场照片 (自动压缩入库)</label>
              <input id="mediaInput" type="file" class="field" accept="image/*" capture="environment" multiple>
              <div id="mediaPreview" class="media-preview">暂无文件</div>
            </div>

            <div class="form-actions">
              <button id="prevStepBtn" type="button" class="secondary-btn">上一步</button>
              <button id="nextStepBtn" type="button" class="primary-btn">下一步</button>
              <button id="submitBtn" type="submit" class="primary-btn is-hidden">提交记录</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <button id="newCaseFab" class="fab" type="button">新建跟台记录</button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
